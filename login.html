<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Printara — Sign In</title>
  <link rel="icon" href="logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#060610;font-family:'Inter',sans-serif;color:#e8e8e8}
    #loginCanvas{position:fixed;inset:0;z-index:0;opacity:0.85;}

    /* ── Form wrap ── */
    #loginWrap{
      position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
      z-index:10;width:320px;opacity:1;
    }

    /* Logo */
    .ll{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:26px}
    .ll img{width:40px;height:40px;border-radius:11px;box-shadow:0 0 22px rgba(0,153,255,.45)}
    .ll h1{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;
            background:linear-gradient(135deg,#fff 30%,#0099ff);-webkit-background-clip:text;
            -webkit-text-fill-color:transparent;background-clip:text}

    /* Tabs */
    .tabs{display:flex;background:rgba(255,255,255,.04);border:1px solid #1e1e2e;border-radius:10px;overflow:hidden;margin-bottom:18px}
    .tab{flex:1;padding:9px 4px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s,color .15s}
    .tab.active{background:#0099ff;color:#fff}
    .tab:not(.active){background:transparent;color:#666}

    /* Inputs */
    .fg{margin-bottom:12px}
    .fg label{display:block;font-size:10px;color:#555;margin-bottom:5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase}
    .fg input{
      width:100%;padding:12px 14px;font-size:13px;font-family:inherit;
      background:rgba(255,255,255,.05);border:1px solid #1e1e2e;border-radius:10px;
      color:#e8e8e8;outline:none;transition:border-color .2s,box-shadow .2s;
    }
    .fg input:focus{border-color:#0099ff;box-shadow:0 0 0 3px rgba(0,153,255,.14)}

    /* Buttons */
    .btn-main{
      width:100%;padding:12px;font-size:13px;font-weight:700;border:none;
      border-radius:10px;cursor:pointer;font-family:inherit;transition:all .15s;
      margin-top:2px;
    }
    .btn-blue{background:#0099ff;color:#fff}
    .btn-blue:hover{background:#007ecc;box-shadow:0 5px 18px rgba(0,153,255,.4)}
    .btn-green{background:#22c55e;color:#fff}
    .btn-green:hover{background:#16a34a;box-shadow:0 5px 18px rgba(34,197,94,.35)}

    /* Error */
    .err{font-size:11px;color:#ef4444;min-height:14px;margin-bottom:6px}

    /* Divider */
    .div{display:flex;align-items:center;gap:10px;margin:14px 0}
    .div::before,.div::after{content:'';flex:1;height:1px;background:#1a1a2e}
    .div span{font-size:10px;color:#333;font-weight:700;letter-spacing:.08em}

    /* Google */
    .btn-google{
      width:100%;padding:11px 14px;font-size:12px;font-weight:700;
      border:1px solid #1e1e2e;border-radius:10px;cursor:pointer;
      font-family:inherit;background:rgba(255,255,255,.04);color:#bbb;
      display:flex;align-items:center;justify-content:center;gap:9px;
      transition:border-color .2s,background .2s;
    }
    .btn-google:hover{border-color:#4285F4;background:rgba(66,133,244,.08);color:#e8e8e8}
  </style>
</head>
<body>

<canvas id="loginCanvas"></canvas>

<div id="loginWrap">
  <div class="ll">
    <img src="logo.png" alt="Printara" />
    <h1>Printara</h1>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabIn" onclick="setTab('in')">Sign In</button>
    <button class="tab"        id="tabUp" onclick="setTab('up')">Sign Up</button>
  </div>

  <!-- Sign In -->
  <div id="pIn">
    <form onsubmit="doSignIn(event)">
      <div class="fg"><label>Email</label><input type="email" id="siEmail" placeholder="you@example.com" autocomplete="email" required /></div>
      <div class="fg"><label>Password</label><input type="password" id="siPwd" placeholder="Your password" autocomplete="current-password" required /></div>
      <div class="err" id="siErr"></div>
      <button type="submit" class="btn-main btn-blue">Sign In →</button>
    </form>
  </div>

  <!-- Sign Up -->
  <div id="pUp" style="display:none">
    <form onsubmit="doSignUp(event)">
      <div class="fg"><label>Name</label><input type="text" id="suName" placeholder="Your name" required /></div>
      <div class="fg"><label>Email</label><input type="email" id="suEmail" placeholder="you@example.com" autocomplete="email" required /></div>
      <div class="fg"><label>Password</label><input type="password" id="suPwd" placeholder="Min 8 characters" minlength="8" autocomplete="new-password" required /></div>
      <div class="err" id="suErr"></div>
      <button type="submit" class="btn-main btn-green">Create Account →</button>
    </form>
  </div>

  <div class="div"><span>or</span></div>

  <!-- Google Sign-In (works when GOOGLE_CLIENT_ID is configured in initGoogle()) -->
  <div id="g_id_onload" data-client_id="" data-callback="handleGoogle" data-auto_prompt="false"></div>
  <button class="btn-google" onclick="triggerGoogle()">
    <svg width="16" height="16" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.706 17.64 9.2z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/></svg>
    Sign in with Google
  </button>
</div>

<script>
// ── Auth ─────────────────────────────────────────────────────────────────────
const SESSION_KEY  = 'printara_session';
const ACCOUNTS_KEY = 'printara_accounts';
const SESSION_TTL  = 12 * 60 * 60 * 1000;

function getSession() {
  try { const s = JSON.parse(sessionStorage.getItem(SESSION_KEY)); return s && (Date.now()-s.ts < SESSION_TTL) ? s : null; } catch { return null; }
}
function startSession(s) { sessionStorage.setItem(SESSION_KEY, JSON.stringify({...s, ts:Date.now()})); }
function getAccounts() { try { return JSON.parse(localStorage.getItem(ACCOUNTS_KEY)||'[]'); } catch { return []; } }
function saveAccounts(a) { localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(a)); }

if (getSession()) { location.replace('queue.html'); }

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function setTab(t) {
  const isIn = t==='in';
  document.getElementById('pIn').style.display = isIn ? '' : 'none';
  document.getElementById('pUp').style.display = isIn ? 'none' : '';
  document.getElementById('tabIn').className = 'tab'+(isIn?' active':'');
  document.getElementById('tabUp').className = 'tab'+(!isIn?' active':'');
}

async function doSignIn(e) {
  e.preventDefault();
  const err   = document.getElementById('siErr');
  const email = document.getElementById('siEmail').value.trim().toLowerCase();
  const pwd   = document.getElementById('siPwd').value;
  const acct  = getAccounts().find(a=>a.email===email && a.provider==='local');
  if (!acct) { err.textContent='No account found — sign up first.'; return; }
  if (await sha256(acct.salt+pwd) !== acct.hash) { err.textContent='Incorrect password.'; document.getElementById('siPwd').value=''; return; }
  startSession({id:acct.id, email:acct.email, name:acct.name, provider:'local'});
  location.replace('queue.html');
}

async function doSignUp(e) {
  e.preventDefault();
  const err   = document.getElementById('suErr');
  const name  = document.getElementById('suName').value.trim();
  const email = document.getElementById('suEmail').value.trim().toLowerCase();
  const pwd   = document.getElementById('suPwd').value;
  const accts = getAccounts();
  if (accts.find(a=>a.email===email)) { err.textContent='Email already registered.'; return; }
  const salt  = crypto.randomUUID();
  const hash  = await sha256(salt+pwd);
  const acct  = {id:'u-'+Date.now().toString(36)+Math.random().toString(36).slice(2,6), email, name, salt, hash, provider:'local'};
  accts.push(acct); saveAccounts(accts);
  startSession({id:acct.id, email:acct.email, name:acct.name, provider:'local'});
  location.replace('queue.html');
}

function triggerGoogle() {
  if (window.google?.accounts?.id) { google.accounts.id.prompt(); }
  else { alert('Google Sign-In requires a configured Client ID. Use email and password to sign in.'); }
}
function handleGoogle(resp) {
  try {
    const payload = JSON.parse(atob(resp.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    const {sub, email, name} = payload;
    const accts = getAccounts();
    let acct = accts.find(a=>a.email===email && a.provider==='google');
    if (!acct) { acct = {id:'g-'+sub, email, name:name||email, provider:'google'}; accts.push(acct); saveAccounts(accts); }
    startSession({id:acct.id, email:acct.email, name:acct.name, provider:'google'});
    location.replace('queue.html');
  } catch(e) { alert('Google sign-in failed: '+e.message); }
}

// ── Animation — two nozzle heads draw the login form ─────────────────────────
const canvas = document.getElementById('loginCanvas');
const ctx    = canvas.getContext('2d');
let W, H, CX, CY;
let animDone = false;

function resize() { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; CX=W/2; CY=H/2; }
resize();
window.addEventListener('resize', resize);

// Geometry
const RAIL_Y = 58;
const FW     = 310;      // form width
const BH     = 44;       // box height
const GAP    = 13;       // gap between boxes

function ft() { return CY - 112; }   // top of first box

// Nozzles
const nozzles = [
  {x:-80, y:RAIL_Y, color:'#0099ff', sparks:[]},
  {x:W+80, y:RAIL_Y, color:'#ff6b35', sparks:[]},
];

// Completed legs (full lines that stay drawn)
const completedLegs = [];

// Current leg being drawn per nozzle
const curLeg = [null, null];
// Leg queues
const legQ   = [[], []];
// Whether each nozzle finished current leg this frame
const legDone= [false, false];

// Build the leg sequences
function buildLegs() {
  const FT  = ft();
  const BX  = CX - FW/2;
  const BXR = CX + FW/2;
  legQ[0].length = 0; legQ[1].length = 0;
  nozzles[0].x = -80;  nozzles[0].y = RAIL_Y;
  nozzles[1].x = W+80; nozzles[1].y = RAIL_Y;

  const ELEMS = [
    {y:FT,                    color:'#0099ff', speed:6},  // email
    {y:FT+BH+GAP,             color:'#0099ff', speed:6},  // password
    {y:FT+(BH+GAP)*2,         color:'#ff6b35', speed:6},  // sign-in
    {y:FT+(BH+GAP)*2+BH+26,  color:'#4285F4', speed:6},  // google
  ];

  // Entry: both nozzles sweep to center along the rail
  legQ[0].push({x1:-80, y1:RAIL_Y, x2:CX, y2:RAIL_Y, color:'#0099ff', draw:true, speed:9});
  legQ[1].push({x1:W+80,y1:RAIL_Y, x2:CX, y2:RAIL_Y, color:'#ff6b35', draw:true, speed:9});

  // For each form element, trace the rectangle (both nozzles split at center)
  for (let ei = 0; ei < ELEMS.length; ei++) {
    const {y, color, speed} = ELEMS[ei];
    const sp = speed;

    // Transit from current center to center-top of this box (no line drawn)
    const prevY = ei===0 ? RAIL_Y : ELEMS[ei-1].y + BH;
    legQ[0].push({x1:CX, y1:prevY, x2:CX, y2:y, color, draw:false, speed:sp+2});
    legQ[1].push({x1:CX, y1:prevY, x2:CX, y2:y, color, draw:false, speed:sp+2});

    // Draw top-left half (nozzle 0 sweeps left) and top-right half (nozzle 1 sweeps right)
    legQ[0].push({x1:CX, y1:y, x2:BX,  y2:y,    color, draw:true, speed:sp});
    legQ[1].push({x1:CX, y1:y, x2:BXR, y2:y,    color, draw:true, speed:sp});

    // Down the sides
    legQ[0].push({x1:BX,  y1:y, x2:BX,  y2:y+BH, color, draw:true, speed:sp-1});
    legQ[1].push({x1:BXR, y1:y, x2:BXR, y2:y+BH, color, draw:true, speed:sp-1});

    // Close the bottom (both converge to center-bottom)
    legQ[0].push({x1:BX,  y1:y+BH, x2:CX, y2:y+BH, color, draw:true, speed:sp});
    legQ[1].push({x1:BXR, y1:y+BH, x2:CX, y2:y+BH, color, draw:true, speed:sp});
  }

  // Park: nozzles exit stage left/right
  const lastY = ELEMS[ELEMS.length-1].y + BH;
  legQ[0].push({x1:CX, y1:lastY, x2:-80,  y2:lastY+60, color:'#0099ff', draw:false, speed:12});
  legQ[1].push({x1:CX, y1:lastY, x2:W+80, y2:lastY+60, color:'#ff6b35', draw:false, speed:12});
}
buildLegs();

// Kick off first leg
curLeg[0] = legQ[0].shift();
curLeg[1] = legQ[1].shift();

function spawnSparks(n, count=5) {
  for (let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3.5;
    n.sparks.push({x:n.x,y:n.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-0.8,life:1,color:n.color});
  }
}

function drawNozzle(x, y, color) {
  // Outer glow
  const g = ctx.createRadialGradient(x,y,0,x,y,26);
  g.addColorStop(0, color+'bb'); g.addColorStop(1, color+'00');
  ctx.save();
  ctx.globalAlpha=0.7; ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(x,y,26,0,Math.PI*2); ctx.fill();
  // Body
  ctx.globalAlpha=1; ctx.shadowBlur=18; ctx.shadowColor=color; ctx.fillStyle=color;
  ctx.fillRect(x-8,y-12,16,12);
  // Tip
  ctx.beginPath(); ctx.moveTo(x-5,y); ctx.lineTo(x+5,y); ctx.lineTo(x+3,y+8); ctx.lineTo(x-3,y+8); ctx.closePath(); ctx.fill();
  // Hot point
  ctx.fillStyle='#fff'; ctx.shadowBlur=10; ctx.shadowColor='#fff';
  ctx.beginPath(); ctx.arc(x,y+8,2.2,0,Math.PI*2); ctx.fill();
  // Carriage rail hint
  ctx.globalAlpha=0.12; ctx.strokeStyle=color; ctx.lineWidth=1; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.moveTo(0,y-12); ctx.lineTo(W,y-12); ctx.stroke();
  ctx.restore();
}

let _frame = 0;

function tick() {
  if (animDone) return;
  requestAnimationFrame(tick);
  _frame++;

  // ── Clear ──
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#060610'; ctx.fillRect(0,0,W,H);

  // Subtle grid
  ctx.strokeStyle='rgba(255,255,255,.025)'; ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=44){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=44){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // ── Completed legs ──
  ctx.lineWidth=1.5; ctx.lineCap='round'; ctx.shadowBlur=10;
  for(const l of completedLegs){
    ctx.globalAlpha=0.75; ctx.strokeStyle=l.color; ctx.shadowColor=l.color;
    ctx.beginPath(); ctx.moveTo(l.x1,l.y1); ctx.lineTo(l.x2,l.y2); ctx.stroke();
  }

  // ── Move nozzles + draw current leg ──
  legDone[0]=false; legDone[1]=false;
  for(let i=0;i<2;i++){
    const n = nozzles[i];
    const leg = curLeg[i];
    if(!leg){ legDone[i]=true; continue; }

    const dx=leg.x2-n.x, dy=leg.y2-n.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const sp=leg.speed||6;

    if(dist<=sp){
      // Arrived at waypoint
      n.x=leg.x2; n.y=leg.y2; n.color=leg.color;
      if(leg.draw) completedLegs.push({x1:leg.x1,y1:leg.y1,x2:leg.x2,y2:leg.y2,color:leg.color});
      spawnSparks(n, leg.draw?8:3);
      curLeg[i]=null;
      legDone[i]=true;
    } else {
      n.x+=(dx/dist)*sp; n.y+=(dy/dist)*sp; n.color=leg.color;
      // Draw in-progress leg from start to current nozzle pos
      if(leg.draw){
        ctx.globalAlpha=0.7; ctx.strokeStyle=leg.color; ctx.shadowColor=leg.color;
        ctx.beginPath(); ctx.moveTo(leg.x1,leg.y1); ctx.lineTo(n.x,n.y); ctx.stroke();
      }
    }

    // Update sparks
    for(const s of n.sparks){s.x+=s.vx;s.y+=s.vy;s.vy+=0.1;s.life-=0.055;}
    n.sparks=n.sparks.filter(s=>s.life>0);
  }
  ctx.shadowBlur=0; ctx.globalAlpha=1;

  // Advance both nozzles to next leg when both done
  if(legDone[0] && legDone[1]){
    const n0=legQ[0].shift(), n1=legQ[1].shift();
    if(n0||n1){ curLeg[0]=n0||null; curLeg[1]=n1||null; }
    else {
      // Animation complete
      animDone=true;
      canvas.style.transition='opacity 2s ease';
      canvas.style.opacity='0.18';
      setTimeout(()=>{ document.getElementById('siEmail')?.focus(); }, 300);
      return;
    }
  }

  // ── Sparks ──
  for(const n of nozzles){
    for(const s of n.sparks){
      ctx.globalAlpha=Math.max(0,s.life); ctx.fillStyle=s.color;
      ctx.beginPath(); ctx.arc(s.x,s.y,2.5*s.life,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha=1;

  // ── Title (fades in early) ──
  const titleAlpha=Math.min(1, _frame/40);
  ctx.globalAlpha=titleAlpha;
  ctx.font='700 13px Inter,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.textAlign='center';
  ctx.fillText('PRINTARA DASHBOARD', CX, RAIL_Y - 22);
  ctx.globalAlpha=1;

  // ── Nozzles ──
  for(const n of nozzles){ if(curLeg[nozzles.indexOf(n)]) drawNozzle(n.x,n.y,n.color); }
}

tick();
</script>
</body>
</html>
