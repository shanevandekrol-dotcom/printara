<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Printara — Dashboard</title>
  <link rel="icon" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0a0a0a; --surface:#111; --surface2:#1a1a1a; --surface3:#242424;
      --border:#2a2a2a; --accent:#0099ff; --accent-dim:rgba(0,153,255,.12);
      --orange:#ff6b35; --orange-dim:rgba(255,107,53,.1);
      --green:#22c55e; --red:#ef4444; --yellow:#eab308;
      --text:#e8e8e8; --text2:#888; --text3:#444; --radius:12px;
    }
    html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:13px; }

    /* topbar */
    #topbar { display:flex; align-items:center; gap:12px; padding:0 20px; height:54px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
    #topbar a { display:flex; align-items:center; gap:8px; text-decoration:none; color:var(--text); font-weight:800; font-size:15px; }
    #topbar a svg { color:var(--accent); }
    .spacer { flex:1; }

    /* dashboard grid */
    #dashboard { padding:24px; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; align-content:start; }

    /* printer card */
    .printer-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; display:flex; flex-direction:column; transition:border-color .15s; }
    .printer-card:hover { border-color:#3a3a3a; }
    .printer-card.printing { border-color:var(--accent); }
    .printer-card.error    { border-color:var(--red); }

    /* camera */
    .card-cam { height:180px; background:#080808; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
    .card-cam img { width:100%; height:100%; object-fit:cover; display:block; }
    .card-cam .no-cam { color:var(--text3); font-size:11px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:8px; }
    .live-badge { position:absolute; top:8px; right:8px; background:rgba(0,0,0,.7); color:var(--green); font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; }

    /* card body */
    .card-body { padding:14px; display:flex; flex-direction:column; gap:10px; flex:1; }
    .card-hdr { display:flex; align-items:center; gap:8px; }
    .pname { font-size:14px; font-weight:800; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tbadge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; background:var(--surface2); color:var(--text2); border:1px solid var(--border); white-space:nowrap; }
    .tbadge.octoprint { background:rgba(0,153,255,.1); color:var(--accent); border-color:rgba(0,153,255,.3); }
    .tbadge.moonraker { background:rgba(34,197,94,.1); color:var(--green); border-color:rgba(34,197,94,.3); }
    .tbadge.bambu     { background:var(--orange-dim); color:var(--orange); border-color:rgba(255,107,53,.3); }
    .tbadge.usb       { background:rgba(234,179,8,.1); color:var(--yellow); border-color:rgba(234,179,8,.3); }
    .sdot { width:8px; height:8px; border-radius:50%; background:var(--text3); flex-shrink:0; }
    .sdot.on  { background:var(--green); box-shadow:0 0 6px var(--green); }
    .sdot.printing { background:var(--accent); box-shadow:0 0 6px var(--accent); animation:blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

    .temps { display:flex; gap:8px; }
    .tchip { flex:1; background:var(--surface2); border-radius:8px; padding:8px; text-align:center; }
    .tchip .lbl { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; }
    .tchip .val { font-size:16px; font-weight:700; margin-top:2px; }
    .tchip .val.hot  { color:var(--orange); }
    .tchip .val.warm { color:var(--yellow); }
    .tchip .tgt { font-size:10px; color:var(--text3); }

    .prog-row { display:flex; justify-content:space-between; font-size:11px; color:var(--text2); margin-bottom:5px; }
    .prog-row span:last-child { font-weight:700; color:var(--accent); }
    .ptrack { height:5px; background:var(--surface3); border-radius:3px; overflow:hidden; }
    .pfill  { height:100%; background:var(--accent); border-radius:3px; width:0%; transition:width .4s; }

    .card-acts { display:flex; gap:6px; margin-top:auto; flex-wrap:wrap; }

    /* add card */
    .add-card { border:2px dashed var(--border); border-radius:var(--radius); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; min-height:240px; cursor:pointer; color:var(--text3); font-size:13px; font-weight:600; transition:all .15s; }
    .add-card:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }

    /* buttons */
    button { cursor:pointer; border:none; border-radius:8px; font-family:inherit; font-size:12px; font-weight:700; transition:all .15s; }
    .btn-primary   { background:var(--accent); color:#fff; padding:8px 14px; }
    .btn-primary:hover { background:#0088ee; }
    .btn-primary:disabled { opacity:.4; cursor:not-allowed; }
    .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); padding:7px 12px; }
    .btn-secondary:hover { background:var(--surface3); }
    .btn-secondary:disabled { opacity:.4; cursor:not-allowed; }
    .btn-danger    { background:rgba(239,68,68,.12); color:var(--red); border:1px solid rgba(239,68,68,.25); padding:7px 12px; }
    .btn-danger:hover { background:rgba(239,68,68,.22); }
    .btn-sm { padding:5px 10px; font-size:11px; }
    .hidden { display:none !important; }

    /* modal */
    .modal-bg { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,.75); display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:28px; width:100%; max-width:420px; max-height:90vh; overflow-y:auto; position:relative; }
    .modal h2 { font-size:18px; font-weight:800; margin-bottom:20px; }
    .mclose { position:absolute; top:18px; right:18px; background:none; border:none; color:var(--text2); font-size:20px; cursor:pointer; }
    .field { margin-bottom:12px; }
    .field label { display:block; font-size:11px; color:var(--text2); margin-bottom:4px; font-weight:600; }
    .field input, .field select { width:100%; padding:9px 11px; font-size:13px; font-family:inherit; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); outline:none; }
    .field input:focus, .field select:focus { border-color:var(--accent); }
    .type-tabs { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:16px; }
    .type-tab  { flex:1; padding:8px 4px; font-size:11px; font-weight:700; border:none; background:var(--surface2); color:var(--text2); cursor:pointer; white-space:nowrap; }
    .type-tab.active { background:var(--accent); color:#fff; }
    .type-tab.bambu.active { background:var(--orange); }
    .type-tab.usb.active   { background:var(--yellow); color:#000; }

    /* manage panel */
    #manage-panel { position:fixed; top:0; right:0; bottom:0; width:420px; background:var(--surface); border-left:1px solid var(--border); z-index:200; display:flex; flex-direction:column; transform:translateX(0); transition:transform .25s ease; }
    #manage-panel.closed { transform:translateX(100%); }
    .ptopbar { display:flex; align-items:center; gap:8px; padding:14px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .ptopbar h2 { font-size:15px; font-weight:800; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pcam { height:190px; background:#080808; overflow:hidden; flex-shrink:0; position:relative; display:flex; align-items:center; justify-content:center; }
    .pcam img { width:100%; height:100%; object-fit:cover; }
    .pcam .no-cam { color:var(--text3); font-size:11px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:6px; }
    .pbody { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:14px; }
    .stitle { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin-bottom:8px; }
    .qi { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:9px 12px; display:flex; align-items:center; gap:8px; }
    .qi.active { border-color:var(--accent); background:var(--accent-dim); }
    .qi .qname { flex:1; font-size:12px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .qbadge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; flex-shrink:0; }
    .badge-queued    { background:var(--surface3); color:var(--text2); }
    .badge-uploading { background:rgba(234,179,8,.12); color:var(--yellow); }
    .badge-printing  { background:var(--accent-dim); color:var(--accent); border:1px solid rgba(0,153,255,.3); }
    .badge-done      { background:rgba(34,197,94,.1); color:var(--green); border:1px solid rgba(34,197,94,.3); }
    .badge-error,.badge-cancelled { background:rgba(239,68,68,.1); color:var(--red); }
    #pcon { min-height:100px; max-height:180px; overflow-y:auto; background:#080808; border-radius:8px; padding:8px; font-family:'Fira Code',monospace; font-size:11px; line-height:1.7; }
    .cl.sent { color:#4ade80; } .cl.recv { color:#94a3b8; } .cl.info { color:var(--accent); } .cl.err { color:var(--red); }
    .cin-row { display:flex; gap:6px; margin-top:6px; }
    .cin-row input { flex:1; padding:7px 10px; font-family:'Fira Code',monospace; font-size:11px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); outline:none; }
    .cin-row input:focus { border-color:var(--accent); }
    .jog { display:grid; grid-template-columns:1fr 1fr; gap:6px; }

    /* toasts */
    #toasts { position:fixed; bottom:20px; right:20px; display:flex; flex-direction:column; gap:8px; z-index:999; pointer-events:none; }
    .toast { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; font-size:12px; max-width:280px; animation:slideIn .2s ease; }
    .toast.success { border-color:rgba(34,197,94,.4); color:var(--green); }
    .toast.error   { border-color:rgba(239,68,68,.4);  color:var(--red); }
    .toast.info    { border-color:rgba(0,153,255,.4);  color:var(--accent); }
    @keyframes slideIn { from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1} }
    ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }
  </style>
</head>
<body>

<header id="topbar">
  <a href="index.html">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/></svg>
    Printara
  </a>
  <span style="color:var(--text3);margin:0 2px">/</span>
  <span style="color:var(--text2);font-weight:600;font-size:14px">Dashboard</span>
  <div class="spacer"></div>
  <button class="btn-primary" onclick="openAdd()">+ Add Printer</button>
</header>

<div id="dashboard">
  <div class="add-card" onclick="openAdd()">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Printer
  </div>
</div>

<!-- Add Printer Modal -->
<div id="add-modal" class="modal-bg hidden" onclick="if(event.target===this)closeAdd()">
  <div class="modal">
    <button class="mclose" onclick="closeAdd()">×</button>
    <h2>Add Printer</h2>
    <div class="field">
      <label>Printer Name</label>
      <input type="text" id="add-name" placeholder="e.g. Ender 3, Bambu X1" autocomplete="off" />
    </div>
    <div class="type-tabs">
      <button class="type-tab usb active" data-at="usb"       onclick="setAT('usb')">USB</button>
      <button class="type-tab"            data-at="octoprint" onclick="setAT('octoprint')">OctoPrint</button>
      <button class="type-tab"            data-at="moonraker" onclick="setAT('moonraker')">Moonraker</button>
      <button class="type-tab bambu"      data-at="bambu"     onclick="setAT('bambu')">Bambu</button>
    </div>
    <div id="add-usb">
      <div class="field">
        <label>Baud Rate</label>
        <select id="add-baud">
          <option value="115200" selected>115200 — most printers</option>
          <option value="250000">250000 — some Marlin</option>
          <option value="57600">57600</option>
          <option value="9600">9600</option>
        </select>
      </div>
      <p style="font-size:11px;color:var(--text3);margin-bottom:12px">A port picker will open in your browser. Only works in Chrome or Edge.</p>
    </div>
    <div id="add-wifi" class="hidden">
      <div class="field">
        <label>Printer IP Address</label>
        <input type="text" id="add-ip" placeholder="192.168.1.100" spellcheck="false" autocomplete="off" />
      </div>
      <div class="field" id="add-key-wrap">
        <label>API Key <span style="color:var(--text3);font-size:10px">(OctoPrint → Settings → API)</span></label>
        <input type="password" id="add-key" placeholder="Paste API key…" spellcheck="false" />
      </div>
      <div class="field hidden" id="add-pin-wrap">
        <label>Access Code <span style="color:var(--text3);font-size:10px">(printer screen → Settings → LAN)</span></label>
        <input type="password" id="add-pin" placeholder="8-character code" spellcheck="false" maxlength="8" />
      </div>
    </div>
    <button class="btn-primary" id="add-btn" onclick="doAdd()" style="width:100%;padding:11px;font-size:14px;margin-top:4px">⚡ Connect</button>
  </div>
</div>

<!-- Manage Panel -->
<div id="manage-panel" class="closed">
  <div class="ptopbar">
    <h2 id="pt">Printer</h2>
    <button class="btn-danger btn-sm" onclick="disconnectManaged()">Disconnect</button>
    <button class="btn-secondary btn-sm" onclick="closeManage()">✕</button>
  </div>
  <div class="pcam" id="pcam">
    <div class="no-cam" id="pnc">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><rect x="2" y="6" width="20" height="14" rx="2"/><circle cx="12" cy="13" r="3"/><path d="M9 6l1.5-2h3L15 6"/></svg>
      No camera
    </div>
    <img id="pcam-img" class="hidden" src="" alt="" />
    <div class="live-badge hidden" id="plive">● LIVE</div>
  </div>
  <div class="pbody">
    <!-- Progress -->
    <div>
      <div class="stitle">Now Printing</div>
      <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="ppfile">Nothing printing</div>
      <div class="ptrack"><div class="pfill" id="ppfill"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:3px">
        <span id="ppsub"></span><span id="pppct" style="color:var(--accent);font-weight:700"></span>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn-secondary btn-sm" id="p-pause"  disabled onclick="pPause()">⏸ Pause</button>
        <button class="btn-secondary btn-sm hidden" id="p-resume" onclick="pResume()">▶ Resume</button>
        <button class="btn-danger btn-sm"    id="p-cancel" disabled onclick="pCancel()">✕ Cancel</button>
      </div>
    </div>
    <!-- Queue -->
    <div>
      <div style="display:flex;align-items:center;margin-bottom:8px">
        <div class="stitle" style="margin:0;flex:1">Queue</div>
        <button class="btn-secondary btn-sm" onclick="pAddFiles()">+ Add</button>
        <button class="btn-primary btn-sm" id="p-start" disabled onclick="pStart()" style="margin-left:6px">▶ Start</button>
      </div>
      <div id="pqueue"><div style="font-size:11px;color:var(--text3);text-align:center;padding:14px">No files queued</div></div>
    </div>
    <!-- Temps -->
    <div>
      <div class="stitle">Temperature</div>
      <div class="temps">
        <div class="tchip"><div class="lbl">Hotend</div><div class="val" id="pt-hotend">—</div><div class="tgt" id="pt-hotend-tgt"></div></div>
        <div class="tchip"><div class="lbl">Bed</div><div class="val" id="pt-bed">—</div><div class="tgt" id="pt-bed-tgt"></div></div>
      </div>
    </div>
    <!-- Commands -->
    <div>
      <div class="stitle">Quick Commands</div>
      <div class="jog">
        <button class="btn-secondary btn-sm" onclick="pCmd('G28')">Home All</button>
        <button class="btn-secondary btn-sm" onclick="pCmd('G28 X Y')">Home XY</button>
        <button class="btn-secondary btn-sm" onclick="pCmd('M104 S0')">Extruder Off</button>
        <button class="btn-secondary btn-sm" onclick="pCmd('M140 S0')">Bed Off</button>
        <button class="btn-secondary btn-sm" onclick="pCmd('M84')">Motors Off</button>
        <button class="btn-secondary btn-sm" onclick="pCmd('M105')">Get Temp</button>
      </div>
    </div>
    <!-- Console -->
    <div style="display:flex;flex-direction:column">
      <div style="display:flex;align-items:center;margin-bottom:6px">
        <div class="stitle" style="margin:0;flex:1">Console</div>
        <button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px" onclick="clearCon()">Clear</button>
      </div>
      <div id="pcon"></div>
      <div class="cin-row">
        <input id="pcin" type="text" placeholder="G-code command…" autocomplete="off" spellcheck="false" />
        <button class="btn-primary btn-sm" onclick="pSendCon()">Send</button>
      </div>
    </div>
  </div>
</div>

<div id="toasts"></div>
<script>
// ── State ──────────────────────────────────────────────────────────────────────
const printers = new Map();
let managedId = null;
let addType = 'usb';

// ── Printer factory ────────────────────────────────────────────────────────────
function mkP(o = {}) {
  return {
    id: o.id || uid(), name: o.name || 'Printer',
    type: o.type || 'usb', ip: o.ip || '',
    apiKey: o.apiKey || '', pin: o.pin || '',
    baudRate: o.baudRate || 115200,
    baseUrl: '',
    connected: false, connecting: false,
    status: 'idle', // idle|printing|paused|error
    hotend: { actual: 0, target: 0 },
    bed:    { actual: 0, target: 0 },
    progress: 0, currentFile: '',
    cameraUrl: '',
    queue: [], currentItem: null,
    isPrinting: false, isPaused: false,
    pollInterval: null, tempInterval: null,
    serialPort: null, serialReader: null, serialWriter: null,
    usbBuf: '', usbLines: [], usbIdx: 0, usbWait: false,
    mqttClient: null, bambuSerial: '', bambuLast: '',
    logs: [],
  };
}

// ── Add modal ──────────────────────────────────────────────────────────────────
function openAdd() { document.getElementById('add-modal').classList.remove('hidden'); document.getElementById('add-name').focus(); }
function closeAdd() { document.getElementById('add-modal').classList.add('hidden'); resetAddBtn(); }
function resetAddBtn() { const b = document.getElementById('add-btn'); b.disabled = false; b.textContent = '⚡ Connect'; }

function setAT(t) {
  addType = t;
  document.querySelectorAll('[data-at]').forEach(x => x.classList.toggle('active', x.dataset.at === t));
  document.getElementById('add-usb').classList.toggle('hidden', t !== 'usb');
  document.getElementById('add-wifi').classList.toggle('hidden', t === 'usb');
  document.getElementById('add-key-wrap').classList.toggle('hidden', t === 'bambu' || t === 'moonraker');
  document.getElementById('add-pin-wrap').classList.toggle('hidden', t !== 'bambu');
}

async function doAdd() {
  const name = document.getElementById('add-name').value.trim() || 'My Printer';
  const btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = 'Connecting…';
  const p = mkP({
    name, type: addType,
    ip:      (document.getElementById('add-ip')  ?.value.trim()) || '',
    apiKey:  (document.getElementById('add-key') ?.value.trim()) || '',
    pin:     (document.getElementById('add-pin') ?.value.trim()) || '',
    baudRate: parseInt(document.getElementById('add-baud')?.value) || 115200,
  });
  printers.set(p.id, p);
  renderCard(p);
  try {
    await connectP(p);
    closeAdd();
    save();
    toast(p.name + ' connected!', 'success');
  } catch (e) {
    printers.delete(p.id);
    document.getElementById('card-' + p.id)?.remove();
    resetAddBtn();
    toast('Failed: ' + e.message, 'error');
  }
}

// ── Connect dispatcher ─────────────────────────────────────────────────────────
async function connectP(p) {
  p.connecting = true; renderCard(p);
  if (p.type === 'usb')       await connectUSB(p);
  else if (p.type === 'bambu') await connectBambu(p);
  else                         await connectHttp(p);
}

// ── USB Web Serial ─────────────────────────────────────────────────────────────
async function connectUSB(p) {
  if (!navigator.serial) throw new Error('Web Serial not supported — use Chrome or Edge');
  const port = await navigator.serial.requestPort();
  await port.open({ baudRate: p.baudRate });
  p.serialPort = port;
  p.serialWriter = port.writable.getWriter();
  p.connected = true; p.connecting = false; p.status = 'idle';
  renderCard(p);
  readUSB(p);
  p.tempInterval = setInterval(() => { if (p.connected) usbWrite(p, 'M105\n'); }, 5000);
  usbWrite(p, 'M115\n');
  usbWrite(p, 'M105\n');
}

async function readUSB(p) {
  const dec = new TextDecoder();
  try {
    while (p.serialPort?.readable) {
      const reader = p.serialPort.readable.getReader();
      p.serialReader = reader;
      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          p.usbBuf += dec.decode(value);
          const lines = p.usbBuf.split('\n');
          p.usbBuf = lines.pop();
          for (const l of lines) { const t = l.trim(); if (t) handleUSBLine(p, t); }
        }
      } finally { reader.releaseLock(); }
    }
  } catch (e) {
    if (p.connected) { p.connected = false; p.status = 'error'; renderCard(p); plog(p, 'Disconnected: ' + e.message, 'err'); }
  }
}

function handleUSBLine(p, line) {
  plog(p, line, 'recv');
  const tm = line.match(/T:(\d+\.?\d*)\s*\/(\d+\.?\d*).*B:(\d+\.?\d*)\s*\/(\d+\.?\d*)/);
  if (tm) {
    p.hotend = { actual: +tm[1], target: +tm[2] };
    p.bed    = { actual: +tm[3], target: +tm[4] };
    renderCard(p); updatePanelTemps(p);
  }
  if (line.startsWith('ok')) {
    p.usbWait = false;
    if (p.isPrinting) sendNextUSBLine(p);
  }
  const sd = line.match(/SD printing byte (\d+)\/(\d+)/);
  if (sd) { p.progress = Math.round(+sd[1] / +sd[2] * 100); renderCard(p); updatePanelProg(p); }
}

async function usbWrite(p, data) {
  if (!p.serialWriter) return;
  await p.serialWriter.write(new TextEncoder().encode(data));
  plog(p, data.trim(), 'sent');
}

function sendNextUSBLine(p) {
  if (p.isPaused || p.usbWait) return;
  while (p.usbIdx < p.usbLines.length) {
    let line = p.usbLines[p.usbIdx++];
    const sc = line.indexOf(';'); if (sc > -1) line = line.slice(0, sc);
    line = line.trim();
    if (!line) continue;
    usbWrite(p, line + '\n');
    p.usbWait = true;
    p.progress = Math.round(p.usbIdx / p.usbLines.length * 100);
    renderCard(p); updatePanelProg(p);
    return;
  }
  onDone(p);
}

function discUSB(p) {
  clearInterval(p.tempInterval);
  p.serialReader?.cancel();
  p.serialWriter?.releaseLock();
  p.serialPort?.close().catch(() => {});
  p.serialPort = null; p.serialReader = null; p.serialWriter = null;
  p.connected = false; p.status = 'idle'; renderCard(p);
}

// ── HTTP (OctoPrint / Moonraker) ───────────────────────────────────────────────
async function connectHttp(p) {
  if (!p.ip) throw new Error('Enter the printer IP');
  p.baseUrl = 'http://' + p.ip.replace(/^https?:\/\//, '');
  const h = p.apiKey ? { 'X-Api-Key': p.apiKey } : {};

  if (p.type === 'octoprint') {
    const r = await ft(p.baseUrl + '/api/version', { headers: h }, 5000).then(r => r.json());
    if (!r.api) throw new Error('Not an OctoPrint server');
    plog(p, 'OctoPrint v' + r.server, 'info');
    try {
      const s = await ft(p.baseUrl + '/api/settings', { headers: h }, 3000).then(r => r.json());
      if (s.webcam?.streamUrl) p.cameraUrl = s.webcam.streamUrl.startsWith('http') ? s.webcam.streamUrl : p.baseUrl + s.webcam.streamUrl;
      else if (s.webcam?.webcamEnabled !== false) p.cameraUrl = p.baseUrl + '/webcam/?action=stream';
    } catch (_) { p.cameraUrl = p.baseUrl + '/webcam/?action=stream'; }
  } else {
    const r = await ft(p.baseUrl + '/printer/info', {}, 5000).then(r => r.json());
    if (!r.result) throw new Error('Not a Moonraker server');
    plog(p, 'Moonraker — ' + r.result.state, 'info');
    try {
      const wc = await ft(p.baseUrl + '/server/webcams/list', {}, 3000).then(r => r.json());
      const cams = wc.result?.webcams || [];
      if (cams.length) { const u = cams[0].stream_url || ''; p.cameraUrl = u.startsWith('http') ? u : p.baseUrl + u; }
    } catch (_) { p.cameraUrl = p.baseUrl + '/webcam/?action=stream'; }
  }

  p.connected = true; p.connecting = false; p.status = 'idle';
  renderCard(p); startPoll(p);
}

function startPoll(p) {
  stopPoll(p);
  p.tempInterval = setInterval(() => pollTemps(p), 5000);
  p.pollInterval = setInterval(() => pollStatus(p), 3000);
  pollTemps(p); pollStatus(p);
}
function stopPoll(p) { clearInterval(p.tempInterval); clearInterval(p.pollInterval); }

async function pollTemps(p) {
  if (!p.connected || p.type === 'bambu' || p.type === 'usb') return;
  const h = p.apiKey ? { 'X-Api-Key': p.apiKey } : {};
  try {
    if (p.type === 'octoprint') {
      const r = await ft(p.baseUrl + '/api/printer', { headers: h }, 3000).then(r => r.json());
      if (r.temperature) { p.hotend = r.temperature.tool0 || p.hotend; p.bed = r.temperature.bed || p.bed; }
    } else {
      const r = await ft(p.baseUrl + '/printer/objects/query?extruder&heater_bed', {}, 3000).then(r => r.json());
      const s = r.result?.status || {};
      if (s.extruder)   p.hotend = { actual: s.extruder.temperature,   target: s.extruder.target };
      if (s.heater_bed) p.bed    = { actual: s.heater_bed.temperature, target: s.heater_bed.target };
    }
    renderCard(p); updatePanelTemps(p);
  } catch (_) {}
}

async function pollStatus(p) {
  if (!p.connected || !p.isPrinting || p.type === 'bambu' || p.type === 'usb') return;
  const h = p.apiKey ? { 'X-Api-Key': p.apiKey } : {};
  try {
    if (p.type === 'octoprint') {
      const r = await ft(p.baseUrl + '/api/job', { headers: h }, 3000).then(r => r.json());
      p.progress = Math.round(r.progress?.completion || 0);
      if (r.state === 'Operational' || r.state === 'Finishing') onDone(p);
    } else {
      const r = await ft(p.baseUrl + '/printer/objects/query?print_stats', {}, 3000).then(r => r.json());
      const ps = r.result?.status?.print_stats;
      if (!ps) return;
      p.progress = ps.total_duration > 0 ? Math.min(99, Math.round(ps.print_duration / ps.total_duration * 100)) : 0;
      if (ps.state === 'complete') onDone(p);
      else if (ps.state === 'error') { p.status = 'error'; }
    }
    renderCard(p); updatePanelProg(p);
  } catch (_) {}
}

function discHttp(p) { stopPoll(p); p.connected = false; p.status = 'idle'; p.isPrinting = false; renderCard(p); }

// ── Bambu Lab ──────────────────────────────────────────────────────────────────
async function connectBambu(p) {
  if (!p.ip)  throw new Error('Enter the printer IP');
  if (!p.pin) throw new Error('Enter the access code');
  return new Promise((res, rej) => {
    const ws = 'ws://' + p.ip.replace(/^https?:\/\//, '') + ':2883';
    p.mqttClient = mqtt.connect(ws, { clientId: 'printara_' + uid().slice(0,8), username: 'bblp', password: p.pin, connectTimeout: 8000, reconnectPeriod: 0, clean: true });
    let ok = false;
    p.mqttClient.on('connect', () => p.mqttClient.subscribe('device/+/report'));
    p.mqttClient.on('message', (topic, raw) => {
      if (!p.bambuSerial) {
        const pts = topic.split('/');
        if (pts.length === 3) { p.bambuSerial = pts[1]; bPub(p, { pushing: { sequence_id: '0', command: 'pushall' } }); }
      }
      if (!ok) { ok = true; p.connected = true; p.connecting = false; p.status = 'idle'; renderCard(p); res(); }
      try { handleBambu(p, JSON.parse(raw.toString())); } catch (_) {}
    });
    p.mqttClient.on('error', e => { if (!ok) { ok = true; rej(e); } });
    p.mqttClient.on('close', () => { if (p.connected) { p.connected = false; p.status = 'idle'; renderCard(p); plog(p, 'Disconnected', 'err'); } });
    setTimeout(() => { if (!ok) { ok = true; rej(new Error('Timeout')); } }, 9000);
  });
}

function bPub(p, payload) { if (p.mqttClient && p.bambuSerial) p.mqttClient.publish('device/' + p.bambuSerial + '/request', JSON.stringify(payload)); }

function handleBambu(p, data) {
  const m = data.print; if (!m) return;
  if (m.nozzle_temper !== undefined) {
    p.hotend = { actual: m.nozzle_temper, target: m.nozzle_target_temper || 0 };
    p.bed    = { actual: m.bed_temper || 0, target: m.bed_target_temper || 0 };
    renderCard(p); updatePanelTemps(p);
  }
  const st = m.gcode_state; if (!st) return;
  if (st === 'RUNNING') { p.progress = m.mc_percent || 0; p.currentFile = m.subtask_name || p.currentFile; p.status = 'printing'; p.isPrinting = true; renderCard(p); updatePanelProg(p); }
  if (st === 'PAUSE') { p.status = 'paused'; p.isPaused = true; renderCard(p); }
  if ((st === 'FINISH' || st === 'FAILED') && p.bambuLast === 'RUNNING') {
    if (st === 'FINISH') onDone(p); else { p.status = 'error'; p.isPrinting = false; renderCard(p); }
  }
  if (st !== p.bambuLast) { plog(p, 'Bambu: ' + st, 'info'); p.bambuLast = st; }
}

function discBambu(p) { p.mqttClient?.end(true); p.mqttClient = null; p.bambuSerial = ''; p.bambuLast = ''; p.connected = false; p.status = 'idle'; renderCard(p); }

// ── Generic disconnect ─────────────────────────────────────────────────────────
function discP(p) {
  if (p.type === 'usb') discUSB(p);
  else if (p.type === 'bambu') discBambu(p);
  else discHttp(p);
}

// ── Send G-code ────────────────────────────────────────────────────────────────
async function sendCmd(p, cmd) {
  if (!p.connected) return;
  plog(p, cmd, 'sent');
  if (p.type === 'usb') { await usbWrite(p, cmd + '\n'); return; }
  if (p.type === 'bambu') { bPub(p, { print: { sequence_id: '0', command: 'gcode_line', param: cmd } }); return; }
  const h = { 'Content-Type': 'application/json', ...(p.apiKey ? { 'X-Api-Key': p.apiKey } : {}) };
  if (p.type === 'octoprint') await fetch(p.baseUrl + '/api/printer/command', { method: 'POST', headers: h, body: JSON.stringify({ command: cmd }) });
  else                        await fetch(p.baseUrl + '/printer/gcode/script',  { method: 'POST', headers: h, body: JSON.stringify({ script: cmd }) });
}

// ── Print flow ─────────────────────────────────────────────────────────────────
function onDone(p) {
  if (p.currentItem) p.currentItem.status = 'done';
  const done = p.currentItem;
  p.currentItem = null; p.isPrinting = false; p.isPaused = false;
  p.status = 'idle'; p.progress = 100;
  renderCard(p); renderPQ();
  toast('Print complete: ' + (done?.name || '') + ' ✓', 'success');
  setTimeout(() => {
    const next = p.queue.find(i => i.status === 'queued');
    if (next) startPrint(p, next); else { p.progress = 0; renderCard(p); }
  }, 3000);
}

async function startPrint(p, item) {
  p.currentItem = item; item.status = 'printing';
  p.isPrinting = true; p.isPaused = false; p.status = 'printing'; p.currentFile = item.name;
  renderCard(p); renderPQ(); updatePanelProg(p);
  document.getElementById('p-pause').disabled  = false;
  document.getElementById('p-cancel').disabled = false;
  document.getElementById('p-start').disabled  = true;

  if (p.type === 'usb') {
    const text = await item.file.text();
    p.usbLines = text.split('\n'); p.usbIdx = 0; p.usbWait = false;
    sendNextUSBLine(p);
    return;
  }
  if (p.type === 'bambu') {
    bPub(p, { print: { sequence_id: '0', command: 'project_file', param: 'Metadata/plate_1.gcode', subtask_name: item.name.replace(/\.[^.]+$/, ''), url: 'ftp://' + p.ip + '/model/' + item.name, timelapse: false, bed_leveling: true, flow_cali: false, vibration_cali: false, layer_inspect: false, ams_mapping: [] } });
    return;
  }
  const h = p.apiKey ? { 'X-Api-Key': p.apiKey } : {};
  item.status = 'uploading'; renderPQ();
  const form = new FormData(); form.append('file', item.file, item.name);
  if (p.type === 'octoprint') {
    form.append('print', 'false');
    await fetch(p.baseUrl + '/api/files/local', { method: 'POST', headers: h, body: form });
    await fetch(p.baseUrl + '/api/files/local/' + encodeURIComponent(item.name), { method: 'POST', headers: { ...h, 'Content-Type': 'application/json' }, body: JSON.stringify({ command: 'select', print: true }) });
  } else {
    await fetch(p.baseUrl + '/server/files/upload', { method: 'POST', body: form });
    await fetch(p.baseUrl + '/printer/print/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ filename: item.name }) });
  }
  item.status = 'printing'; renderPQ();
}

async function pausePrint(p) {
  const h = { 'Content-Type': 'application/json', ...(p.apiKey ? { 'X-Api-Key': p.apiKey } : {}) };
  if (p.type === 'usb')       { p.isPaused = true; }
  else if (p.type === 'bambu') bPub(p, { print: { sequence_id: '0', command: 'pause' } });
  else if (p.type === 'octoprint') await fetch(p.baseUrl + '/api/job', { method: 'POST', headers: h, body: JSON.stringify({ command: 'pause', action: 'pause' }) });
  else                             await fetch(p.baseUrl + '/printer/print/pause', { method: 'POST' });
  p.isPaused = true; p.status = 'paused'; renderCard(p);
  document.getElementById('p-pause').classList.add('hidden');
  document.getElementById('p-resume').classList.remove('hidden');
}

async function resumePrint(p) {
  const h = { 'Content-Type': 'application/json', ...(p.apiKey ? { 'X-Api-Key': p.apiKey } : {}) };
  if (p.type === 'usb')        { p.isPaused = false; sendNextUSBLine(p); }
  else if (p.type === 'bambu') bPub(p, { print: { sequence_id: '0', command: 'resume' } });
  else if (p.type === 'octoprint') await fetch(p.baseUrl + '/api/job', { method: 'POST', headers: h, body: JSON.stringify({ command: 'pause', action: 'resume' }) });
  else                             await fetch(p.baseUrl + '/printer/print/resume', { method: 'POST' });
  p.isPaused = false; p.status = 'printing'; renderCard(p);
  document.getElementById('p-resume').classList.add('hidden');
  document.getElementById('p-pause').classList.remove('hidden');
}

async function cancelPrint(p) {
  if (!confirm('Cancel the current print?')) return;
  const h = { 'Content-Type': 'application/json', ...(p.apiKey ? { 'X-Api-Key': p.apiKey } : {}) };
  if (p.type === 'usb')        { p.usbLines = []; p.usbIdx = 0; p.usbWait = false; }
  else if (p.type === 'bambu') bPub(p, { print: { sequence_id: '0', command: 'stop' } });
  else if (p.type === 'octoprint') await fetch(p.baseUrl + '/api/job', { method: 'POST', headers: h, body: JSON.stringify({ command: 'cancel' }) });
  else                             await fetch(p.baseUrl + '/printer/print/cancel', { method: 'POST' });
  if (p.currentItem) p.currentItem.status = 'cancelled';
  p.currentItem = null; p.isPrinting = false; p.isPaused = false; p.status = 'idle'; p.progress = 0;
  renderCard(p); renderPQ(); updatePanelProg(p);
}

// ── Manage panel ───────────────────────────────────────────────────────────────
function openManage(id) {
  managedId = id;
  const p = printers.get(id); if (!p) return;
  document.getElementById('pt').textContent = p.name;
  document.getElementById('manage-panel').classList.remove('closed');
  const img = document.getElementById('pcam-img');
  const nc  = document.getElementById('pnc');
  const live = document.getElementById('plive');
  if (p.cameraUrl) {
    img.src = p.cameraUrl; img.classList.remove('hidden'); nc.classList.add('hidden'); live.classList.remove('hidden');
  } else {
    img.classList.add('hidden'); nc.classList.remove('hidden'); live.classList.add('hidden');
  }
  renderPQ(); updatePanelProg(p); updatePanelTemps(p);
  const con = document.getElementById('pcon'); con.innerHTML = '';
  for (const m of p.logs) { const d = document.createElement('div'); d.className = 'cl ' + (m.t||''); d.textContent = ({sent:'→ ',info:'◉ ',err:'✗ '}[m.t]||'← ') + m.s; con.appendChild(d); }
  con.scrollTop = con.scrollHeight;
}
function closeManage() { managedId = null; document.getElementById('manage-panel').classList.add('closed'); }
function disconnectManaged() { const p = printers.get(managedId); if (p) discP(p); closeManage(); }

function updatePanelProg(p) {
  if (managedId !== p.id) return;
  document.getElementById('ppfile').textContent = p.currentFile || (p.isPrinting ? 'Printing…' : 'Nothing printing');
  document.getElementById('ppfill').style.width = p.progress + '%';
  document.getElementById('pppct').textContent  = p.isPrinting ? p.progress + '%' : '';
  document.getElementById('p-pause').disabled   = !p.isPrinting;
  document.getElementById('p-cancel').disabled  = !p.isPrinting;
  document.getElementById('p-start').disabled   = !p.connected || p.isPrinting;
}

function updatePanelTemps(p) {
  if (managedId !== p.id) return;
  const fmtV = (v, el, cls) => {
    el.textContent = v.actual.toFixed(1) + '°';
    el.className = 'val' + (v.actual > (cls === 'h' ? 60 : 50) ? ' hot' : v.actual > (cls === 'h' ? 35 : 30) ? ' warm' : '');
  };
  fmtV(p.hotend, document.getElementById('pt-hotend'), 'h');
  fmtV(p.bed,    document.getElementById('pt-bed'),    'b');
  document.getElementById('pt-hotend-tgt').textContent = p.hotend.target > 0 ? '→ ' + p.hotend.target + '°' : '';
  document.getElementById('pt-bed-tgt').textContent    = p.bed.target    > 0 ? '→ ' + p.bed.target    + '°' : '';
}

function renderPQ() {
  const p = printers.get(managedId); if (!p) return;
  const el = document.getElementById('pqueue');
  if (!p.queue.length) { el.innerHTML = '<div style="font-size:11px;color:var(--text3);text-align:center;padding:14px">No files queued</div>'; return; }
  el.innerHTML = '';
  for (const item of p.queue) {
    const d = document.createElement('div');
    d.className = 'qi' + (item === p.currentItem ? ' active' : '');
    d.innerHTML = `<div class="qname" title="${item.name}">${item.name}</div><div class="qbadge badge-${item.status}">${item.status}</div>${item.status==='queued'?`<button onclick="rmQI('${p.id}','${item.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 4px">✕</button>`:''}`;
    el.appendChild(d);
  }
  document.getElementById('p-start').disabled = !p.connected || p.isPrinting || !p.queue.some(i=>i.status==='queued');
}

function rmQI(pid, iid) { const p = printers.get(pid); if (p) { p.queue = p.queue.filter(i=>i.id!==iid); renderPQ(); } }

function pAddFiles() {
  const p = printers.get(managedId); if (!p) return;
  const inp = document.createElement('input'); inp.type = 'file'; inp.multiple = true; inp.accept = '.gcode,.g,.gc,.gco,.ngc,.3mf';
  inp.onchange = () => { for (const f of inp.files) p.queue.push({ id: uid(), name: f.name, file: f, status: 'queued' }); renderPQ(); };
  inp.click();
}
function pStart()   { const p = printers.get(managedId); if (!p || p.isPrinting) return; const n = p.queue.find(i=>i.status==='queued'); if (n) startPrint(p, n); }
function pPause()   { const p = printers.get(managedId); if (p) pausePrint(p); }
function pResume()  { const p = printers.get(managedId); if (p) resumePrint(p); }
function pCancel()  { const p = printers.get(managedId); if (p) cancelPrint(p); }
function pCmd(cmd)  { const p = printers.get(managedId); if (p && p.connected) sendCmd(p, cmd); }
function pSendCon() { const i = document.getElementById('pcin'); const v = i.value.trim(); if (!v) return; pCmd(v); i.value = ''; }
function clearCon() { const p = printers.get(managedId); if (p) { p.logs = []; document.getElementById('pcon').innerHTML = ''; } }

// ── Render ─────────────────────────────────────────────────────────────────────
function renderCard(p) {
  const existing = document.getElementById('card-' + p.id);
  const card = buildCard(p);
  if (existing) existing.replaceWith(card);
  else document.getElementById('dashboard').insertBefore(card, document.querySelector('.add-card'));
}

function buildCard(p) {
  const el = document.createElement('div');
  el.id = 'card-' + p.id;
  el.className = 'printer-card' + (p.status==='printing'?' printing':p.status==='error'?' error':'');
  const dotCls = !p.connected ? '' : p.status === 'printing' ? 'printing' : 'on';
  const tLabel = { octoprint:'OctoPrint', moonraker:'Moonraker', bambu:'Bambu Lab', usb:'USB Serial' }[p.type] || p.type;
  const hv = p.hotend.actual.toFixed(1) + '°', hc = p.hotend.actual > 60 ? 'hot' : p.hotend.actual > 35 ? 'warm' : '';
  const bv = p.bed.actual.toFixed(1)    + '°', bc = p.bed.actual    > 50 ? 'hot' : p.bed.actual    > 30 ? 'warm' : '';

  el.innerHTML = `
    <div class="card-cam">
      ${p.cameraUrl
        ? `<img src="${p.cameraUrl}" alt="cam" onerror="this.style.display='none';this.nextElementSibling.classList.remove('hidden')" /><div class="no-cam hidden"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><rect x="2" y="6" width="20" height="14" rx="2"/><circle cx="12" cy="13" r="3"/><path d="M9 6l1.5-2h3L15 6"/></svg>Camera unavailable</div><div class="live-badge">● LIVE</div>`
        : `<div class="no-cam"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><rect x="2" y="6" width="20" height="14" rx="2"/><circle cx="12" cy="13" r="3"/><path d="M9 6l1.5-2h3L15 6"/></svg>${p.type==='usb'?'USB — no camera':'No camera'}</div>`}
    </div>
    <div class="card-body">
      <div class="card-hdr">
        <div class="pname">${p.name}${p.connecting?' <span style="color:var(--text3);font-weight:400;font-size:11px">connecting…</span>':''}</div>
        <div class="tbadge ${p.type}">${tLabel}</div>
        <div class="sdot ${dotCls}"></div>
      </div>
      <div class="temps">
        <div class="tchip"><div class="lbl">Hotend</div><div class="val ${hc}">${hv}</div><div class="tgt">${p.hotend.target>0?'→ '+p.hotend.target+'°':''}</div></div>
        <div class="tchip"><div class="lbl">Bed</div><div class="val ${bc}">${bv}</div><div class="tgt">${p.bed.target>0?'→ '+p.bed.target+'°':''}</div></div>
      </div>
      <div>
        <div class="prog-row"><span>${p.isPrinting?(p.currentFile||'Printing…'):p.connected?'Ready':'Not connected'}</span>${p.isPrinting?`<span>${p.progress}%</span>`:''}</div>
        <div class="ptrack"><div class="pfill" style="width:${p.progress}%"></div></div>
      </div>
      <div class="card-acts">
        ${p.connected
          ? `<button class="btn-primary btn-sm" onclick="openManage('${p.id}')">Manage</button>
             ${p.isPrinting&&!p.isPaused?`<button class="btn-secondary btn-sm" onclick="event.stopPropagation();pausePrint(printers.get('${p.id}'))">⏸</button>`:''}
             ${p.isPaused?`<button class="btn-secondary btn-sm" onclick="event.stopPropagation();resumePrint(printers.get('${p.id}'))">▶</button>`:''}
             ${p.isPrinting?`<button class="btn-danger btn-sm" onclick="event.stopPropagation();cancelPrint(printers.get('${p.id}'))">✕</button>`:''}
             <button class="btn-danger btn-sm" onclick="rmP('${p.id}')">Remove</button>`
          : `<button class="btn-primary btn-sm" onclick="recon('${p.id}')">Reconnect</button>
             <button class="btn-danger btn-sm" onclick="rmP('${p.id}')">Remove</button>`}
      </div>
    </div>`;
  return el;
}

function rmP(id) {
  if (!confirm('Remove this printer?')) return;
  const p = printers.get(id); if (p) discP(p);
  printers.delete(id);
  document.getElementById('card-' + id)?.remove();
  if (managedId === id) closeManage();
  save();
}
async function recon(id) {
  const p = printers.get(id); if (!p) return;
  try { await connectP(p); save(); } catch (e) { toast('Reconnect failed: ' + e.message, 'error'); }
}

// ── Log ────────────────────────────────────────────────────────────────────────
function plog(p, s, t) {
  p.logs.push({ s, t });
  if (p.logs.length > 500) p.logs.shift();
  if (managedId === p.id) {
    const con = document.getElementById('pcon');
    const d = document.createElement('div'); d.className = 'cl ' + (t||'');
    d.textContent = ({sent:'→ ',info:'◉ ',err:'✗ '}[t]||'← ') + s;
    con.appendChild(d); con.scrollTop = con.scrollHeight;
    while (con.children.length > 300) con.removeChild(con.firstChild);
  }
}

// ── Persistence ────────────────────────────────────────────────────────────────
const LS = 'printara_v3';
function save() {
  localStorage.setItem(LS, JSON.stringify([...printers.values()].map(p => ({ id:p.id, name:p.name, type:p.type, ip:p.ip, apiKey:p.apiKey, pin:p.pin, baudRate:p.baudRate }))));
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(LS) || '[]');
    for (const o of d) {
      if (o.type === 'usb') continue; // USB needs user gesture
      const p = mkP(o); printers.set(p.id, p); renderCard(p);
      connectP(p).catch(e => plog(p, 'Auto-connect: ' + e.message, 'err'));
    }
  } catch (_) {}
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function ft(url, opts, ms) { const c = new AbortController(); setTimeout(() => c.abort(), ms); return fetch(url, { ...opts, signal: c.signal }); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function toast(msg, type='info') {
  const el = document.createElement('div'); el.className = 'toast ' + type; el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 4000);
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('pcin').addEventListener('keydown', e => { if (e.key==='Enter') pSendCon(); });
document.getElementById('add-name').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('add-ip')?.focus(); });

// ── Init ───────────────────────────────────────────────────────────────────────
setAT('usb');
load();
</script>
</body>
